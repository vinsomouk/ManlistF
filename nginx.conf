server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Empêche le navigateur de deviner un autre type MIME
    add_header X-Content-Type-Options "nosniff" always;

    # Empêche l'affichage du site dans une iframe externe
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Limite les informations envoyées dans l'en-tête Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Désactive les fonctions navigateur inutilisées par Manlist
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache long pour les fichiers générés par Vite
    location /assets/ {
        try_files $uri =404;

        expires 1y;

        add_header Cache-Control "public, immutable";

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Support de React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ne pas mettre index.html en cache trop longtemps
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Refuser l'accès aux fichiers cachés
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}